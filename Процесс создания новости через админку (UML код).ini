@startuml
title Создание/Публикация новости админом

actor Admin as A
participant Admin_front as F
participant Admin_back as B
participant user_back as UB
participant user_front as UF

alt
activate A
A -> F : Нажал на "Создать новость"
activate F
F -> B : Отправил запрос на открытие панели
activate B
B -> B : Обработал запрос
B --> F : Открыл панель создания новости
deactivate B
F --> A : Показал панель создания новости 
A -> F : Внес всю информацию для создания новости
F -> F : сохранил все во временом черновике
F --> A : Отобразил временный черновик
A -> F : Нажал "опубликовать новость"
F -> B : Отправил запрос на публикацию
activate B 
B -> B : Обработал запрос на публикацию
B -> UB : Отправил запрос на публикацию в пользовательский бэк
activate UB
UB -> UB : Обработал запрос 
UB -> UF : Отправил публикацию в пользовательский интерфейс
activate UF
UF -> UF : Отобразил новость на интерфейсе
UF --> UB : Послал сигнал об успешном отображении новости
deactivate UF
UB --> B : Послал сигнал, что новость успешно опубликована
deactivate UB
B --> F : Передал сигнал об успешной публикации
deactivate B
F --> A : Вывел надпись "Новость успешно опубликована"
deactivate F

else Решил отменить публикацию
A -> F : Нажал на "Создать новость"
activate F
F -> B : Отправил запрос на открытие панели
activate B
B -> B : Обработал запрос
B --> F : Открыл панель создания новости
deactivate B
F --> A : Показал панель создания новости 
A -> F : Внес всю информацию для создания новости
F -> F : сохранил все во временом черновике
F --> A : Отобразил временный черновик
A -> F : Нажал "отменить"
F -> F : удаляет временный черновик
F --> A : Отменяет создание новости и возвращает в личный кабинет
deactivate F
deactivate A
end
@enduml